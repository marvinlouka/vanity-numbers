<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US Vanity Repeater Numbers — TossableDigits</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--border:#2e3347;--accent:#4f8ef7;--text:#e2e8f0;--muted:#64748b;--green:#22c55e}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.card{text-align:center;max-width:480px;padding:48px 32px;background:var(--surface);border:1px solid var(--border);border-radius:16px}
h1{font-size:1.8rem;font-weight:700;margin-bottom:6px}
h1 span{color:var(--accent)}
.subtitle{color:var(--muted);font-size:.9rem;margin-top:8px}
.badge{display:inline-flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:.78rem;color:var(--muted);margin-top:20px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.note{margin-top:28px;color:var(--muted);font-size:.85rem;line-height:1.6}
a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <h1>US Vanity <span>Repeater</span> Numbers</h1>
  <p class="subtitle">Repeating-digit phone numbers available on TossableDigits.com</p>
  <div class="badge"><span class="dot"></span>Updating daily</div>
  <p class="note">
    Full data loading — this page auto-updates every day.<br>
    Source: <a href="https://www.tossabledigits.com" target="_blank">TossableDigits.com</a>
  </p>
</div>
</body>
</html>
